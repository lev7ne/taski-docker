volumes:
  pg_data_production:
  static_volume:

services:
  db:
    image: postgres:13.10
    restart: always
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data

  backend:
    image: divinelev1ne/taski_backend:latest
    restart: always
    env_file: .env
    volumes:
      - static_volume:/backend_static
    depends_on:
      - db

  frontend:
    image: divinelev1ne/taski_frontend:latest
    restart: on-failure
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static

  gateway:
    image: divinelev1ne/taski_gateway:latest
    restart: always
    env_file: .env
    volumes:
      - static_volume:/staticfiles/
    ports:
      - 8000:80
    depends_on:
      - backend
      - frontend